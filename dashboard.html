<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Vault | March 27</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="nav-bar">
        <button onclick="showSection('ask')">Ask Sweety</button>
        <button onclick="showSection('answer')">Answer Now</button>
        <button onclick="showSection('history')">Our Story</button>
    </div>

    <div id="ask-section" class="container section">
        <h2>Ask a Question</h2>
        <textarea id="new-question" placeholder="Future plans, dreams, imaginations..."></textarea>
        <button onclick="submitQuestion()">Send to Vault</button>
    </div>

    <div id="answer-section" class="container section" style="display:none;">
        <div id="question-display" class="question-box">Searching...</div>
        <textarea id="answer-text" placeholder="Your heart's response..."></textarea>
        <button onclick="submitAnswer()">Save Answer</button>
    </div>

    <div id="history-section" class="container section" style="display:none;">
        <h2>Our Journey History</h2>
        <div id="history-list"></div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="script.js"></script>
</body>
</html>
